<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e0c;
      --paper: #f5f2ec;
      --muted: #7a7570;
      --border: #d5cfc4;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1000px;
      margin: auto;
      padding: 3rem 2rem;
      gap: 3rem;
    }

    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 1rem;
    }

    .product-desc {
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .includes {
      list-style: none;
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      color: var(--muted);
    }

    .price-box {
      margin-top: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .total {
      font-weight: bold;
      font-size: 1.3rem;
      margin-top: 0.5rem;
    }

    .field-group {
      margin-bottom: 1.5rem;
    }

    label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 0.5rem;
    }

    .qty {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      width: fit-content;
    }

    .qty button {
      width: 40px;
      height: 40px;
      border: none;
      background: white;
      cursor: pointer;
    }

    .qty input {
      width: 60px;
      text-align: center;
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    #checkout-btn {
      width: 100%;
      padding: 1rem;
      margin-top: 2rem;
      background: var(--ink);
      color: white;
      border: none;
      cursor: pointer;
    }

    .product-option {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      color: var(--ink);
    }
  </style>
</head>

<body>

<main>

  <!-- LEFT -->
  <section>
    <h1 class="product-name"></h1>
    <p class="product-desc"></p>

    <div class="price-box">
      <div class="row">
        <span>One-time</span>
        <span>$<span id="onetime-total"></span></span>
      </div>

      <div class="row">
        <span>Monthly</span>
        <span>$<span id="recurring-total"></span></span>
      </div>

      <div class="row total">
        <span>Total</span>
        <span id="total-display"></span>
      </div>
    </div>

    <ul class="includes"></ul>
  </section>

  <!-- RIGHT -->
  <section>

    <div class="field-group">
      <label>Choose Product</label>
      <div id="product-options"></div>
    </div>

    <div class="field-group">
      <label>Quantity</label>
      <div class="qty">
        <button id="decrement">−</button>
        <input id="quantity" value="1" readonly />
        <button id="increment">+</button>
      </div>
    </div>

    <button id="checkout-btn">Proceed to Payment</button>

  </section>

</main>

<script>
/* ─────────────────────────────
   PRODUCTS
───────────────────────────── */
const products = [
  {
    id: "rpm",
    name: "HealthAssist RPM",
    description: "One Time Setup Fee + Monthly Subscription",
    oneTimePrice: 140.00,
    monthlyPrice: 24.95,
    includes: [
      "One-time device shipped",
      "Remote monitoring access",
      "Cancel anytime",
      "Secure Stripe checkout"
    ]
  },
  {
    id: "care",
    name: "CarePlus Monitoring",
    description: "Monthly monitoring plan",
    oneTimePrice: 0,
    monthlyPrice: 19.95,
    includes: [
      "Monthly health tracking",
      "Nurse support",
      "Email reports",
      "Cancel anytime"
    ]
  }
];

let activeProduct = products[0];

/* ─────────────────────────────
   DOM
───────────────────────────── */
const nameEl = document.querySelector('.product-name');
const descEl = document.querySelector('.product-desc');
const includesEl = document.querySelector('.includes');

const onetimeEl = document.getElementById('onetime-total');
const recurringEl = document.getElementById('recurring-total');
const totalEl = document.getElementById('total-display');

const qtyInput = document.getElementById('quantity');
const decBtn = document.getElementById('decrement');
const incBtn = document.getElementById('increment');

const productOptionsEl = document.getElementById('product-options');

/* ─────────────────────────────
   RENDER PRODUCTS (RADIO)
───────────────────────────── */
function renderProductOptions() {
  productOptionsEl.innerHTML = products.map(p => `
    <label class="product-option">
      <input type="radio" name="product" value="${p.id}" ${p.id === activeProduct.id ? "checked" : ""}>
      ${p.name}
    </label>
  `).join('');

  document.querySelectorAll('input[name="product"]').forEach(radio => {
    radio.addEventListener('change', e => {
      setProduct(e.target.value);
    });
  });
}

/* ─────────────────────────────
   SET PRODUCT
───────────────────────────── */
function setProduct(id) {
  activeProduct = products.find(p => p.id === id);

  nameEl.textContent = activeProduct.name;
  descEl.textContent = activeProduct.description;

  includesEl.innerHTML = activeProduct.includes
    .map(i => `<li>${i}</li>`)
    .join('');

  updatePricing();
}

/* ─────────────────────────────
   PRICING
───────────────────────────── */
function getQty() {
  return parseInt(qtyInput.value, 10) || 1;
}

function updatePricing() {
  const qty = getQty();

  const onetime = activeProduct.oneTimePrice * qty;
  const recurring = activeProduct.monthlyPrice * qty;

  onetimeEl.textContent = onetime.toFixed(2);
  recurringEl.textContent = recurring.toFixed(2);
  totalEl.textContent = `$${(onetime + recurring).toFixed(2)}`;

  decBtn.disabled = qty <= 1;
}

/* ─────────────────────────────
   QUANTITY
───────────────────────────── */
decBtn.onclick = () => {
  if (getQty() > 1) qtyInput.value = getQty() - 1;
  updatePricing();
};

incBtn.onclick = () => {
  if (getQty() < 99) qtyInput.value = getQty() + 1;
  updatePricing();
};

/* ─────────────────────────────
   CHECKOUT
───────────────────────────── */
document.getElementById('checkout-btn').addEventListener('click', async () => {
  const res = await fetch('/api/create-checkout', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      productId: activeProduct.id,
      quantity: getQty()
    })
  });

  const data = await res.json();
  if (!res.ok) return alert(data.error);

  window.location.href = data.url;
});

/* ─────────────────────────────
   INIT
───────────────────────────── */
renderProductOptions();
setProduct(activeProduct.id);
updatePricing();

</script>

</body>
</html>
