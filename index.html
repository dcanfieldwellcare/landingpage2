<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #0f0e0c;
  --paper: #f5f2ec;
  --cream: #ede9e0;
  --gold: #b8943f;
  --gold-light: #d4ae62;
  --red: #c0392b;
  --muted: #7a7570;
  --border: #d5cfc4;
}
html, body {
  height: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
}
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
header {
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 2.5rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
header .logo-mark {
  width: 32px; height: 32px;
  background: var(--ink);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
header .logo-mark svg { width: 16px; height: 16px; fill: var(--paper); }
header .brand {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  letter-spacing: 0.03em;
}
main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
  gap: 0;
  padding: 4rem 2rem;
  align-items: start;
}
.product-info {
  padding-right: 4rem;
  border-right: 1px solid var(--border);
}
.eyebrow {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1rem;
}
.product-name {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  line-height: 1.1;
  margin-bottom: 1.25rem;
}
.product-desc {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--muted);
  margin-bottom: 2rem;
}
.divider {
  height: 1px;
  background: var(--border);
  margin: 2rem 0;
}
.pricing-breakdown {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.price-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}
.price-row .label {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.4;
}
.price-row .label strong {
  display: block;
  color: var(--ink);
  font-weight: 500;
  font-size: 0.9rem;
}
.price-row .amount {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  white-space: nowrap;
  text-align: right;
}
.price-row .amount .per {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  color: var(--muted);
  display: block;
}
.price-total {
  border-top: 1px solid var(--border);
  padding-top: 1rem;
  margin-top: 0.5rem;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.price-total .label {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
  color: var(--muted);
}
#total-display {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  transition: all 0.2s ease;
}
.checkout-form {
  padding-left: 4rem;
}
.checkout-form h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  margin-bottom: 0.4rem;
}
.checkout-form .subtitle {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 2.5rem;
}
.field-group {
  margin-bottom: 1.5rem;
}
label {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.6rem;
}
.text-input {
  width: 100%;
  padding: 0.85rem 1rem;
  border: 1px solid var(--border);
  background: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--ink);
  border-radius: 4px;
  outline: none;
  transition: border-color 0.15s;
}
.text-input:focus { border-color: var(--ink); }
.quantity-stepper {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1px solid var(--border);
  background: white;
  width: fit-content;
  border-radius: 4px;
  overflow: hidden;
}
.qty-btn {
  width: 48px; height: 56px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.4rem;
  font-weight: 300;
  color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  user-select: none;
}
.qty-btn:hover { background: var(--cream); }
.qty-btn:active { background: var(--border); }
#quantity {
  width: 64px; height: 56px;
  border: none;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  background: white;
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--ink);
  outline: none;
  -moz-appearance: textfield;
}
#quantity::-webkit-inner-spin-button,
#quantity::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ── ADDONS ── */
.addon-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: white;
  margin-bottom: 0.6rem;
  cursor: pointer;
  transition: border-color 0.15s;
}
.addon-item:hover { border-color: var(--gold); }
.addon-item.selected { border-color: var(--ink); background: var(--cream); }
.addon-left {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.addon-check {
  width: 18px; height: 18px;
  cursor: pointer;
  accent-color: var(--ink);
  flex-shrink: 0;
}
.addon-info {
  display: flex;
  flex-direction: column;
}
.addon-label {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--ink);
  text-transform: none;
  letter-spacing: 0;
  margin-bottom: 0.15rem;
  cursor: pointer;
}
.addon-desc {
  font-size: 0.78rem;
  color: var(--muted);
}
.addon-price {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  white-space: nowrap;
  margin-left: 1rem;
}

.includes {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-bottom: 2.5rem;
}
.includes li {
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  color: var(--muted);
}
.includes li::before {
  content: '';
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--ink);
  flex-shrink: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 8l3.5 3.5L13 5' stroke='%23f5f2ec' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
}
#checkout-btn {
  width: 100%;
  padding: 1.1rem 2rem;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  transition: background 0.2s, transform 0.15s;
  position: relative;
  overflow: hidden;
}
#checkout-btn:hover { background: #2a2825; }
#checkout-btn:active { transform: scale(0.99); }
#checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#checkout-btn .arrow { transition: transform 0.2s; }
#checkout-btn:hover .arrow { transform: translateX(4px); }
.secure-note {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  margin-top: 1rem;
  font-size: 0.75rem;
  color: var(--muted);
}
.secure-note svg { width: 12px; height: 12px; opacity: 0.5; }
#error-msg {
  display: none;
  background: #fdf0ee;
  border: 1px solid #e8c4bf;
  color: var(--red);
  font-size: 0.82rem;
  padding: 0.75rem 1rem;
  border-radius: 4px;
  margin-bottom: 1rem;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(245,242,236,0.3);
  border-top-color: var(--paper);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 700px) {
  main {
    grid-template-columns: 1fr;
    padding: 2rem 1.5rem;
    gap: 2.5rem;
  }
  .product-info { padding-right: 0; border-right: none; border-bottom: 1px solid var(--border); padding-bottom: 2.5rem; }
  .checkout-form { padding-left: 0; }
}
</style>
</head>
<body>

<main>
  <!-- LEFT: Product Info -->
  <section class="product-info">
    <h1 class="product-name">HealthAssist RPM</h1>
    <p class="product-desc">One Time Setup Fee + Monthly Subscription</p>
    <div class="divider"></div>
    <div class="pricing-breakdown">
      <div class="price-row">
        <div class="label">
          <strong>One-time fee</strong>
          e.g. hardware, kit, setup
        </div>
        <div class="amount">
          $<span id="onetime-total">140.00</span>
          <span class="per">once</span>
        </div>
      </div>
      <div class="price-row">
        <div class="label">
          <strong>Monthly subscription</strong>
          ongoing access &amp; support
        </div>
        <div class="amount">
          $<span id="recurring-total">24.95</span>
          <span class="per">/ mo</span>
        </div>
      </div>
      <div class="price-total">
        <span class="label">Today's total</span>
        <span id="total-display">$164.95</span>
      </div>
    </div>
  </section>

  <!-- RIGHT: Checkout -->
  <section class="checkout-form">
    <h2>Complete Your Order</h2>
    <p class="subtitle">Select quantity, then proceed to secure payment.</p>
