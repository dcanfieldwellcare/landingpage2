<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HealthAssist RPM - Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0f0e0c;
      --paper:   #f5f2ec;
      --cream:   #ede9e0;
      --gold:    #b8943f;
      --gold-light: #d4ae62;
      --red:     #c0392b;
      --muted:   #7a7570;
      --border:  #d5cfc4;
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      gap: 0;
      padding: 4rem 2rem;
      align-items: start;
    }

    .product-info {
      padding-right: 4rem;
      border-right: 1px solid var(--border);
    }

    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      line-height: 1.1;
      margin-bottom: 1.25rem;
    }

    .product-desc {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 2rem;
      min-height: 3rem;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .price-row .label { font-size: 0.85rem; color: var(--muted); }
    .price-row .label strong { display: block; color: var(--ink); font-weight: 500; }
    .price-row .amount { font-family: 'Playfair Display', serif; font-size: 1rem; text-align: right; }

    .price-total {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    #total-display {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--ink);
    }

    .checkout-form { padding-left: 4rem; }
    .field-group { margin-bottom: 1.5rem; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    select {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--border);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      border-radius: 4px;
      outline: none;
    }

    .quantity-stepper {
      display: flex;
      border: 1px solid var(--border);
      background: white;
      width: fit-content;
      border-radius: 4px;
      overflow: hidden;
    }

    .qty-btn { width: 48px; height: 48px; border: none; background: none; cursor: pointer; font-size: 1.2rem; }
    #quantity { width: 50px; text-align: center; border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); font-family: 'Playfair Display', serif; font-size: 1.2rem; }

    #checkout-btn {
      width: 100%;
      padding: 1.1rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      margin-top: 1rem;
      transition: opacity 0.2s;
    }

    #checkout-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .includes { list-style: none; margin: 1.5rem 0; color: var(--muted); font-size: 0.85rem; }
    .includes li { margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .includes li::before { content: '✓'; color: var(--gold); font-weight: bold; }

    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; padding: 2rem 1rem; }
      .product-info { padding-right: 0; border-right: none; border-bottom: 1px solid var(--border); padding-bottom: 2rem; }
      .checkout-form { padding-left: 0; margin-top: 2rem; }
    }
  </style>
</head>
<body>

<main>
  <section class="product-info">
    <h1 class="product-name">Loading...</h1>
    <p class="product-desc">Please select a plan to continue.</p>

    <div class="divider"></div>

    <div class="pricing-breakdown">
      <div class="price-row">
        <div class="label"><strong>One-time fee</strong>Setup & hardware</div>
        <div class="amount">$<span id="onetime-total">0.00</span></div>
      </div>
      <div class="price-row">
        <div class="label"><strong>Monthly subscription</strong>Access & support</div>
        <div class="amount">$<span id="recurring-total">0.00</span></div>
      </div>
      <div class="price-total">
        <span class="label">Today's total</span>
        <span id="total-display">$0.00</span>
      </div>
    </div>
  </section>

  <section class="checkout-form">
    <h2>Complete Your Order</h2>
    
    <div class="field-group">
      <label for="product-select">Select Plan</label>
      <select id="product-select">
        </select>
    </div>

    <div class="field-group">
      <label for="quantity">Quantity</label>
      <div class="quantity-stepper">
        <button class="qty-btn" id="decrement">−</button>
        <input type="number" id="quantity" value="1" readonly />
        <button class="qty-btn" id="increment">+</button>
      </div>
    </div>

    <ul class="includes">
      <li>Secure hardware delivery</li>
      <li>Instant app access</li>
      <li>Cancel anytime</li>
    </ul>

    <button id="checkout-btn">Proceed to Payment</button>
  </section>
</main>

<script>
  // ── CONFIG: Replace price_... with actual Stripe IDs ──
  const products = [
    {
      id: 'rpm-standard',
      name: 'HealthAssist RPM',
      onetime: 140.00,
      onetimePriceId: 'price_YOUR_STANDARD_SETUP_ID', 
      recurring: 24.95,
      recurringPriceId: 'price_YOUR_STANDARD_MONTHLY_ID',
      description: 'Our standard remote patient monitoring setup with core health tracking.'
    },
    {
      id: 'rpm-pro',
      name: 'HealthAssist PRO',
      onetime: 250.00,
      onetimePriceId: 'price_YOUR_PRO_SETUP_ID',
      recurring: 45.00,
      recurringPriceId: 'price_YOUR_PRO_MONTHLY_ID',
      description: 'Advanced monitoring kit with 24/7 priority support and secondary sensors.'
    },
    {
      id: 'rpm-lite',
      name: 'HealthAssist LITE',
      onetime: 75.00,
      onetimePriceId: 'price_YOUR_LITE_SETUP_ID',
      recurring: 15.00,
      recurringPriceId: 'price_YOUR_LITE_MONTHLY_ID',
      description: 'Essential monitoring for basic health check-ins and monthly reporting.'
    }
  ];

  let currentProduct = products[0];

  const productSelect = document.getElementById('product-select');
  const qtyInput      = document.getElementById('quantity');
  const onetimeEl     = document.getElementById('onetime-total');
  const recurringEl   = document.getElementById('recurring-total');
  const totalEl       = document.getElementById('total-display');
  const prodNameEl    = document.querySelector('.product-name');
  const prodDescEl    = document.querySelector('.product-desc');

  // Initialize Select Options
  products.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.name} ($${p.onetime} + $${p.recurring}/mo)`;
    productSelect.appendChild(opt);
  });

  function updatePricing() {
    const qty = parseInt(qtyInput.value) || 1;
    const oTotal = (currentProduct.onetime * qty).toFixed(2);
    const rTotal = (currentProduct.recurring * qty).toFixed(2);
    const tTotal = (parseFloat(oTotal) + parseFloat(rTotal)).toFixed(2);

    prodNameEl.textContent = currentProduct.name;
    prodDescEl.textContent = currentProduct.description;
    onetimeEl.textContent = oTotal;
    recurringEl.textContent = rTotal;
    totalEl.textContent = `$${tTotal}`;
  }

  productSelect.addEventListener('change', (e) => {
    currentProduct = products.find(p => p.id === e.target.value);
    updatePricing();
  });

  document.getElementById('increment').addEventListener('click', () => {
    qtyInput.value = parseInt(qtyInput.value) + 1;
    updatePricing();
  });

  document.getElementById('decrement').addEventListener('click', () => {
    if (qtyInput.value > 1) {
      qtyInput.value = parseInt(qtyInput.value) - 1;
      updatePricing();
    }
  });

  document.getElementById('checkout-btn').addEventListener('click', async () => {
    const btn = document.getElementById('checkout-btn');
    btn.disabled = true;
    btn.textContent = 'Redirecting...';

    try {
      const response = await fetch('/api/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          onetimePriceId: currentProduct.onetimePriceId,
          recurringPriceId: currentProduct.recurringPriceId,
          quantity: parseInt(qtyInput.value) 
        }),
      });

      const data = await response.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        throw new Error('No redirect URL found');
      }
    } catch (err) {
      console.error(err);
      alert('Checkout error. Please check your Stripe Price IDs.');
      btn.disabled = false;
      btn.textContent = 'Proceed to Payment';
    }
  });

  updatePricing();
</script>
</body>
</html>
